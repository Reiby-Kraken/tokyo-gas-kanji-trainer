<script>
"use strict";
(function(){
  var P = JSON.parse(document.getElementById("payload").textContent);
  function b64d(s){ var bin=atob(s), n=bin.length, u=new Uint8Array(n); for(var i=0;i<n;i++){ u[i]=bin.charCodeAt(i); } return u; }
  var form=document.getElementById("f"), pwEl=document.getElementById("pw"), err=document.getElementById("err"), go=document.getElementById("go");
  function fail(m){ err.textContent=m; go.disabled=false; go.textContent="Unlock"; pwEl.value=""; pwEl.focus(); }
  function injectApp(html){
    // Inject the decrypted app into THIS live first-party document (no document.write / document.open).
    // This preserves the normal origin + localStorage, which some engines (notably iOS Safari) do not
    // treat reliably for documents recreated via document.write.
    var doc = new DOMParser().parseFromString(html, "text/html");
    try { if(doc.title){ document.title = doc.title; } } catch(e){}
    var scripts = [];
    function move(src, dst){
      var kids = Array.prototype.slice.call(src.childNodes), i;
      for(i=0;i<kids.length;i++){
        var node = kids[i];
        if(node.nodeType === 1 && node.tagName === "SCRIPT"){ scripts.push(node); }
        else { dst.appendChild(document.importNode(node, true)); }
      }
    }
    document.head.innerHTML = "";
    document.body.innerHTML = "";
    if(doc.head){ move(doc.head, document.head); }
    if(doc.body){ move(doc.body, document.body); }
    if(doc.body && doc.body.attributes){ var a; for(a=0;a<doc.body.attributes.length;a++){ var at=doc.body.attributes[a]; try { document.body.setAttribute(at.name, at.value); } catch(e){} } }
    var j;
    for(j=0;j<scripts.length;j++){
      var s = scripts[j], el = document.createElement("script"), b;
      for(b=0;b<s.attributes.length;b++){ el.setAttribute(s.attributes[b].name, s.attributes[b].value); }
      el.text = s.textContent;
      document.body.appendChild(el);
    }
  }
  form.addEventListener("submit", function(ev){
    ev.preventDefault();
    var pw = pwEl.value || "";
    if(!pw){ fail("Enter the password"); return; }
    if(!(window.crypto && window.crypto.subtle)){ fail("This browser needs HTTPS and Web Crypto to unlock"); return; }
    go.disabled=true; go.textContent="Unlocking...";
    var enc=new TextEncoder();
    crypto.subtle.importKey("raw", enc.encode(pw), {name:"PBKDF2"}, false, ["deriveKey"]).then(function(km){
      return crypto.subtle.deriveKey({name:"PBKDF2", salt:b64d(P.salt), iterations:P.iter, hash:"SHA-256"}, km, {name:"AES-GCM", length:256}, false, ["decrypt"]);
    }).then(function(key){
      return crypto.subtle.decrypt({name:"AES-GCM", iv:b64d(P.iv)}, key, b64d(P.ct));
    }).then(function(buf){
      var html=new TextDecoder().decode(buf);
      injectApp(html);
    }).catch(function(){ fail("Wrong password"); });
  });
})();
</script>
