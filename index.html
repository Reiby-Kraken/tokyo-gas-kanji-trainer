<script>
"use strict";
(function(){
  var P = JSON.parse(document.getElementById("payload").textContent);
  function b64d(s){ var bin=atob(s), n=bin.length, u=new Uint8Array(n); for(var i=0;i<n;i++){ u[i]=bin.charCodeAt(i); } return u; }
  var form=document.getElementById("f"), pwEl=document.getElementById("pw"), err=document.getElementById("err"), go=document.getElementById("go");
  function fail(m){ err.textContent=m; go.disabled=false; go.textContent="Unlock"; pwEl.value=""; pwEl.focus(); }
  form.addEventListener("submit", function(ev){
    ev.preventDefault();
    var pw = pwEl.value || "";
    if(!pw){ fail("Enter the password"); return; }
    if(!(window.crypto && window.crypto.subtle)){ fail("This browser needs HTTPS and Web Crypto to unlock"); return; }
    go.disabled=true; go.textContent="Unlocking...";
    var enc=new TextEncoder();
    crypto.subtle.importKey("raw", enc.encode(pw), {name:"PBKDF2"}, false, ["deriveKey"]).then(function(km){
      return crypto.subtle.deriveKey({name:"PBKDF2", salt:b64d(P.salt), iterations:P.iter, hash:"SHA-256"}, km, {name:"AES-GCM", length:256}, false, ["decrypt"]);
    }).then(function(key){
      return crypto.subtle.decrypt({name:"AES-GCM", iv:b64d(P.iv)}, key, b64d(P.ct));
    }).then(function(buf){
      var html=new TextDecoder().decode(buf);
      document.open(); document.write(html); document.close();
    }).catch(function(){ fail("Wrong password"); });
  });
})();
</script>
